<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سراج · تفاصيل المشروع</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #fbfdff;
      --line: #e5edf3;
      --line-strong: #d8e2ea;
      --text: #142033;
      --muted: #6f7f90;
      --accent: #18c79c;
      --accent-dark: #0da77f;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.04);
      --radius: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(24, 199, 156, 0.05), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, #fbfcfe 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1600px;
      margin: 0 auto;
      padding: 26px 28px 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 14px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
    }

    .ghost-btn, .primary-btn {
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: .95rem;
      cursor: pointer;
      transition: .18s ease;
    }

    .ghost-btn {
      background: var(--surface);
      color: var(--text);
    }

    .ghost-btn:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      min-width: 166px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(24, 199, 156, 0.2);
    }

    .primary-btn:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .status {
      font-size: .92rem;
      color: var(--muted);
      min-height: 24px;
    }

    .status.ok { color: #118f6c; }
    .status.err { color: #d13a4a; }

    .tabs {
      display: flex;
      align-items: center;
      gap: 40px;
      border-bottom: 1px solid var(--line);
      padding: 0 6px;
      margin-bottom: 38px;
      overflow-x: auto;
    }

    .tab {
      position: relative;
      padding: 18px 0 20px;
      color: #5a6a7b;
      font-size: 1rem;
      font-weight: 700;
      background: transparent;
      border: 0;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      right: 0;
      left: 0;
      bottom: -1px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
    }

    .panes { display: block; }
    .pane { display: none; }
    .pane.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      align-items: start;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 36px 26px;
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 18px;
      text-align: right;
    }

    .section-divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 28px;
    }

    .field label {
      display: block;
      font-size: .95rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .required::after {
      content: ' *';
      color: #dc4d4d;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 16px 18px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9aa9b7;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(24, 199, 156, 0.5);
      box-shadow: 0 0 0 4px rgba(24, 199, 156, 0.09);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.8;
    }

    .hint {
      margin-top: 8px;
      font-size: .88rem;
      color: var(--muted);
    }

    .card-actions {
      display: flex;
      justify-content: flex-start;
      padding-top: 6px;
    }

    .files-card {
      background: var(--surface);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 28px;
    }

    .file-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .file-row:last-child { border-bottom: 0; }

    .file-name {
      font-weight: 700;
      color: var(--text);
    }

    .file-meta {
      color: var(--muted);
      font-size: .92rem;
    }

    .empty-state {
      padding: 36px 12px;
      text-align: center;
      color: var(--muted);
    }

    .submission-box {
      background: var(--surface-soft);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius-sm);
      padding: 24px;
      line-height: 1.9;
      color: var(--text);
    }

    @media (max-width: 980px) {
      .shell { padding: 20px 16px 34px; }
      .grid { grid-template-columns: 1fr; gap: 22px; }
      .card, .files-card { padding: 22px 18px; }
      .tabs { gap: 24px; margin-bottom: 24px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .topbar-actions { justify-content: space-between; }
      .primary-btn { min-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <div class="brand">تفاصيل المشروع</div>
        <div class="status" id="statusMsg"></div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-btn" type="button" onclick="window.location.href='/'">العودة للوحة التحكم</button>
        <button class="ghost-btn" type="button" onclick="doLogout()">تسجيل الخروج</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-pane="details">تفاصيل المشروع</button>
      <button class="tab" data-pane="files">الملفات (<span id="filesCount">0</span>)</button>
      <button class="tab" data-pane="submission">تقديم</button>
    </div>

    <div class="panes">
      <section class="pane active" id="pane-details">
        <div class="grid">
          <form class="card" id="linksForm">
            <h2>الروابط والتقنيات</h2>
            <div class="section-divider"></div>

            <div class="field">
              <label for="repositoryUrl">رابط المستودع</label>
              <input id="repositoryUrl" name="repositoryUrl" type="url" placeholder=".../https://github.com">
            </div>

            <div class="field">
              <label for="demoUrl">رابط العرض</label>
              <input id="demoUrl" name="demoUrl" type="url" placeholder="https://your-demo.com">
            </div>

            <div class="field">
              <label for="technologies">التقنيات</label>
              <input id="technologies" name="technologies" type="text" placeholder="React, Node.js, PostgreSQL">
              <div class="hint">قائمة التقنيات مفصولة بفواصل</div>
            </div>

            <div class="card-actions">
              <button class="primary-btn" type="submit">حفظ الروابط</button>
            </div>
          </form>

          <form class="card" id="basicForm">
            <h2>المعلومات الأساسية</h2>
            <div class="section-divider"></div>

            <div class="field">
              <label class="required" for="title">عنوان المشروع</label>
              <input id="title" name="title" type="text">
            </div>

            <div class="field">
              <label for="description">الوصف</label>
              <textarea id="description" name="description"></textarea>
            </div>

            <div class="field">
              <label for="problem">بيان المشكلة</label>
              <textarea id="problem" name="problem"></textarea>
            </div>

            <div class="field">
              <label for="solutionOverview">نظرة عامة على الحل</label>
              <textarea id="solutionOverview" name="solutionOverview"></textarea>
            </div>

            <div class="card-actions">
              <button class="primary-btn" type="submit">حفظ التفاصيل</button>
            </div>
          </form>
        </div>
      </section>

      <section class="pane" id="pane-files">
        <div class="files-card">
          <h2 style="margin-bottom: 14px;">ملفات المشروع</h2>
          <div id="filesList"></div>
        </div>
      </section>

      <section class="pane" id="pane-submission">
        <div class="files-card">
          <h2 style="margin-bottom: 14px;">حالة التقديم</h2>
          <div class="submission-box" id="submissionBox"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const token = localStorage.getItem('siraj_token');
      const expiresAt = parseInt(localStorage.getItem('siraj_token_exp') || '0', 10);
      if (!token || Date.now() > expiresAt) {
        window.location.href = '/login';
      }
    })();

    async function apiFetch(url, opts = {}) {
      const token = localStorage.getItem('siraj_token');
      const response = await fetch(url, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'x-auth-token': token,
          ...(opts.headers || {})
        }
      });

      if (response.status === 401) {
        localStorage.removeItem('siraj_token');
        localStorage.removeItem('siraj_token_exp');
        window.location.href = '/login';
        return null;
      }

      return response;
    }

    async function doLogout() {
      await apiFetch('/api/logout', { method: 'POST' });
      localStorage.removeItem('siraj_token');
      localStorage.removeItem('siraj_token_exp');
      window.location.href = '/login';
    }

    const statusMsg = document.getElementById('statusMsg');
    const filesCount = document.getElementById('filesCount');

    function setStatus(message, kind = '') {
      statusMsg.className = `status ${kind}`.trim();
      statusMsg.textContent = message;
    }

    function renderProject(project) {
      document.getElementById('title').value = project.title || '';
      document.getElementById('description').value = project.description || '';
      document.getElementById('problem').value = project.problem || '';
      document.getElementById('solutionOverview').value = project.solutionOverview || '';
      document.getElementById('repositoryUrl').value = project.repositoryUrl || '';
      document.getElementById('demoUrl').value = project.demoUrl || '';
      document.getElementById('technologies').value = project.technologies || '';

      const files = Array.isArray(project.files) ? project.files : [];
      filesCount.textContent = files.length;

      const filesList = document.getElementById('filesList');
      filesList.innerHTML = files.length
        ? files.map((file) => `
            <div class="file-row">
              <div>
                <div class="file-name">${file.name}</div>
                <div class="file-meta">تم الرفع ${file.uploadedAt} · ${file.size}</div>
              </div>
              <div class="file-meta">جاهز</div>
            </div>
          `).join('')
        : '<div class="empty-state">لا توجد ملفات مرفوعة حالياً.</div>';

      document.getElementById('submissionBox').innerHTML = project.submitted
        ? 'تم تقديم المشروع بنجاح. يمكنك مراجعة الملفات والروابط قبل الإرسال النهائي مرة أخرى.'
        : 'لم يتم إرسال المشروع بعد. هذه الشاشة تعرض تفاصيل المشروع والملفات الجاهزة للمراجعة قبل التقديم النهائي.';
    }

    async function loadProject() {
      setStatus('جاري تحميل بيانات المشروع...');
      const response = await apiFetch('/api/project');
      if (!response) return;
      const data = await response.json();
      renderProject(data.project || {});
      setStatus('تم تحميل البيانات.', 'ok');
    }

    async function submitJSON(url, payload, successMessage) {
      setStatus('جاري الحفظ...');
      const response = await apiFetch(url, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      if (!response) return;

      const data = await response.json();
      if (!data.success) {
        setStatus(data.error || 'تعذر حفظ البيانات.', 'err');
        return;
      }

      renderProject(data.project || {});
      setStatus(successMessage, 'ok');
    }

    document.getElementById('basicForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      await submitJSON('/api/project/basic', {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        problem: document.getElementById('problem').value,
        solutionOverview: document.getElementById('solutionOverview').value
      }, 'تم حفظ التفاصيل الأساسية.');
    });

    document.getElementById('linksForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      await submitJSON('/api/project/links', {
        repositoryUrl: document.getElementById('repositoryUrl').value,
        demoUrl: document.getElementById('demoUrl').value,
        technologies: document.getElementById('technologies').value
      }, 'تم حفظ الروابط والتقنيات.');
    });

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach((node) => node.classList.remove('active'));
        document.querySelectorAll('.pane').forEach((node) => node.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`pane-${tab.dataset.pane}`).classList.add('active');
      });
    });

    loadProject();
  </script>
</body>
</html>
